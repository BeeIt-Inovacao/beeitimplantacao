name: Deploy para Hostinger

on:
  push:
    branches: [ main ]
    paths:
      - 'public/**'
      - 'src/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validar código
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build (copiar src → public se houver fonte)
        run: |
          if [ -f "src/BeeIT-OS-RT-v2.html" ]; then
            echo "📦 Building from src/ to public/"
            mkdir -p public
            cp src/BeeIT-OS-RT-v2.html public/index.html
          fi
          ls -la public/

      - name: Validar HTML + JS inline
        run: |
          if [ -f "public/index.html" ]; then
            node -e "const fs=require('fs');const html=fs.readFileSync('public/index.html','utf8');const scripts=[...html.matchAll(/<script(?:(?!type=\"(?:module|application\\/json)\")[^>])*>([\s\S]*?)<\/script>/g)].map(m=>m[1]).filter(s=>s.trim().length>0);console.log('Scripts inline encontrados:',scripts.length);let err=0;scripts.forEach((s,i)=>{try{new Function(s);}catch(e){console.error('❌ Script',i,':',e.message);err++;}});if(err>0){process.exit(1);}console.log('✅ Todos os scripts inline são válidos');"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: beeit-build
          path: public/
          retention-days: 7

  deploy:
    name: Deploy FTP Hostinger
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build para public/
        run: |
          if [ -f "src/BeeIT-OS-RT-v2.html" ]; then
            mkdir -p public
            cp src/BeeIT-OS-RT-v2.html public/index.html
          fi

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: /public_html/
          log-level: verbose
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
            **/*.bak
            **/*.tmp

      - name: Notificar sucesso
        run: echo "✅ Deploy concluído em https://implantacao.com.br"
